name: Check Upstream and Build

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      has_new: ${{ steps.compare.outputs.has_new }}
      upstream_tag: ${{ steps.upstream_tag.outputs.tag }}
      upstream_tag_sha: ${{ steps.upstream_tag.outputs.sha }}
      has_new_tag: ${{ steps.compare_tag.outputs.has_new_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get upstream latest commit
        id: upstream
        run: |
          UPSTREAM_SHA=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/NousResearch/hermes-agent/commits/main \
            | jq -r '.sha // empty')
          echo "sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "Upstream SHA: $UPSTREAM_SHA"

      - name: Get last known SHA
        id: cached
        run: |
          if [ -f .upstream-sha ]; then
            LAST_SHA=$(cat .upstream-sha)
            echo "sha=$LAST_SHA" >> "$GITHUB_OUTPUT"
            echo "Last known SHA: $LAST_SHA"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "No cached SHA found"
          fi

      - name: Compare and update
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" != "${{ steps.cached.outputs.sha }}" ] && \
             [ -n "${{ steps.upstream.outputs.sha }}" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.upstream.outputs.sha }}" > .upstream-sha
            echo "New commit detected: ${{ steps.upstream.outputs.sha }}"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new commits"
          fi

      - name: Get upstream latest tag
        id: upstream_tag
        run: |
          TAG_INFO=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/NousResearch/hermes-agent/tags?per_page=1")
          LATEST_TAG=$(echo "$TAG_INFO" | jq -r '.[0].name // empty')
          TAG_SHA=$(echo "$TAG_INFO" | jq -r '.[0].commit.sha // empty')
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $LATEST_TAG (sha: $TAG_SHA)"

      - name: Get last known tag
        id: cached_tag
        run: |
          if [ -f .upstream-tag ]; then
            LAST_TAG=$(cat .upstream-tag)
            echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
            echo "Last known tag: $LAST_TAG"
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "No cached tag found"
          fi

      - name: Compare tag
        id: compare_tag
        run: |
          if [ -n "${{ steps.upstream_tag.outputs.tag }}" ] && \
             [ "${{ steps.upstream_tag.outputs.tag }}" != "${{ steps.cached_tag.outputs.tag }}" ]; then
            echo "has_new_tag=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.upstream_tag.outputs.tag }}" > .upstream-tag
            echo "New tag detected: ${{ steps.upstream_tag.outputs.tag }}"
          else
            echo "has_new_tag=false" >> "$GITHUB_OUTPUT"
            echo "No new tags"
          fi

      - name: Commit updated SHA
        if: steps.compare.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-sha
          git commit -m "chore: update upstream SHA to ${{ steps.upstream.outputs.sha }}"
          git push

      - name: Commit updated tag
        if: steps.compare_tag.outputs.has_new_tag == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-tag
          git commit -m "chore: update upstream tag to ${{ steps.upstream_tag.outputs.tag }}"
          git push

  build:
    needs: check
    if: needs.check.outputs.has_new == 'true' || needs.check.outputs.has_new_tag == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate version tags
        id: tags
        run: |
          {
            echo "ghcr.io/jiqfu/hermes-root-build:latest"
            echo "ghcr.io/jiqfu/hermes-root-build:$(date -u +%Y%m%d)"
            if [ -n "${{ needs.check.outputs.upstream_tag }}" ]; then
              echo "ghcr.io/jiqfu/hermes-root-build:${{ needs.check.outputs.upstream_tag }}"
            fi
          } > /tmp/tags.txt
          echo "list<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/tags.txt >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.tags.outputs.list }}
          build-args: |
            UPSTREAM_SHA=${{ needs.check.outputs.upstream_tag_sha || needs.check.outputs.upstream_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup old daily tags (keep last 30 days)
        shell: bash
        run: |
          CUTOFF=$(date -u -d '30 days ago' +%s)
          echo "Cleaning up YYYYMMDD tags older than $(date -u -d @$CUTOFF '+%Y-%m-%d')"
          gh api "/user/packages/container/hermes-root-build/versions?per_page=100" \
            --jq '.[] | {id: .id, tags: .metadata.container.tags, created: .created_at}' \
            | jq -c '.' | while read -r ver; do
              CREATED=$(echo "$ver" | jq -r '.created')
              CREATED_TS=$(date -u -d "$CREATED" +%s)
              if [ "$CREATED_TS" -lt "$CUTOFF" ]; then
                TAGS=$(echo "$ver" | jq -r '.tags[]' 2>/dev/null)
                for tag in $TAGS; do
                  if [[ "$tag" =~ ^[0-9]{8}$ ]]; then
                    ID=$(echo "$ver" | jq -r '.id')
                    echo "  Delete: id=$ID tags=$(echo "$ver" | jq -rc '.tags') created=$CREATED"
                    gh api -X DELETE "/user/packages/container/hermes-root-build/versions/$ID" --silent
                    break
                  fi
                done
              fi
            done
          echo "Cleanup done"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
