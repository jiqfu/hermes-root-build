name: Check Upstream and Build

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      upstream_sha: ${{ steps.upstream.outputs.sha }}
      has_new: ${{ steps.compare.outputs.has_new }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get upstream latest commit
        id: upstream
        run: |
          UPSTREAM_SHA=$(curl -sL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/NousResearch/hermes-agent/commits/main \
            | jq -r '.sha // empty')
          echo "sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "Upstream SHA: $UPSTREAM_SHA"

      - name: Get last known SHA
        id: cached
        run: |
          if [ -f .upstream-sha ]; then
            LAST_SHA=$(cat .upstream-sha)
            echo "sha=$LAST_SHA" >> "$GITHUB_OUTPUT"
            echo "Last known SHA: $LAST_SHA"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "No cached SHA found"
          fi

      - name: Compare and update
        id: compare
        run: |
          if [ "${{ steps.upstream.outputs.sha }}" != "${{ steps.cached.outputs.sha }}" ] && \
             [ -n "${{ steps.upstream.outputs.sha }}" ]; then
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.upstream.outputs.sha }}" > .upstream-sha
            echo "New commit detected: ${{ steps.upstream.outputs.sha }}"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
            echo "No new commits"
          fi

      - name: Commit updated SHA
        if: steps.compare.outputs.has_new == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-sha
          git commit -m "chore: update upstream SHA to ${{ steps.upstream.outputs.sha }}"
          git push

  build:
    needs: check
    if: needs.check.outputs.has_new == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate version tag
        id: version
        run: |
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/jiqfu/hermes-root-build:latest
            ghcr.io/jiqfu/hermes-root-build:${{ steps.version.outputs.date }}
          build-args: |
            UPSTREAM_SHA=${{ needs.check.outputs.upstream_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
